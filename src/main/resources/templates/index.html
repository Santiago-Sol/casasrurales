<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casas Rurales</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="landing">
<main class="hero">
    <section class="card">
        <p class="eyebrow">Casas Rurales</p>
        <h1>Reserva o administra alojamientos desde un solo lugar</h1>
        <p class="lead">Elige si quieres entrar como cliente para reservar o como propietario para gestionar tus casas.</p>
        <div class="actions">
            <a class="button primary" th:href="@{/registro/cliente}">Registrarme como cliente</a>
            <a class="button secondary" th:href="@{/registro/propietario}">Registrarme como propietario</a>
        </div>
        <p class="subtle">¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a></p>
    </section>
</main>
</body>
</html>
