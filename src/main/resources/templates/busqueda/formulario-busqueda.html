<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Casas Rurales</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .search-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-form input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-form button {
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .search-form button:hover {
            background-color: #0056b3;
        }

        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .alert.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<main class="page-shell">
    <section class="search-container">
        <h1>Buscar Casas Rurales</h1>
        <p class="lead">Encuentra la casa rural perfecta para tu próxima escapada</p>

        <div class="alert info" th:if="${mensaje}">
            <p th:text="${mensaje}"></p>
        </div>

        <form method="get" th:action="@{/busqueda/resultados}" class="search-form">
            <input 
                type="text" 
                id="poblacion" 
                name="poblacion" 
                placeholder="Ingresa el nombre de la población (ej: Salento, Filandia)"
                th:value="${poblacionBuscada}"
                required>
            <button type="submit">Buscar</button>
        </form>

        <p class="subtle" style="margin-top: 30px;">
            <a th:href="@{/dashboard/cliente}">Volver al dashboard</a>
        </p>
    </section>
</main>
</body>
</html>
