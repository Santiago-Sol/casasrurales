<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de propietario</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-shell">
    <section class="form-card">
        <h1>Registro de propietario</h1>
        <p class="lead">Crea tu cuenta para administrar casas rurales y paquetes de alquiler.</p>

        <div class="alert error" th:if="${errorRegistro}" th:text="${errorRegistro}"></div>

        <form th:action="@{/registro/propietario}" th:object="${registroPropietarioForm}" method="post">
            <label for="nombreCuenta">Nombre de cuenta</label>
            <input id="nombreCuenta" th:field="*{nombreCuenta}" type="text" required>
            <p class="field-error" th:if="${#fields.hasErrors('nombreCuenta')}" th:errors="*{nombreCuenta}"></p>

            <label for="email">Correo</label>
            <input id="email" th:field="*{email}" type="email" required>
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

            <label for="telefono">Teléfono</label>
            <input id="telefono" th:field="*{telefono}" type="text" required>
            <p class="field-error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></p>

            <label for="numeroCuentaBancaria">Cuenta bancaria</label>
            <input id="numeroCuentaBancaria" th:field="*{numeroCuentaBancaria}" type="text" required>
            <p class="field-error" th:if="${#fields.hasErrors('numeroCuentaBancaria')}" th:errors="*{numeroCuentaBancaria}"></p>

            <label for="password">Contraseña</label>
            <input id="password" th:field="*{password}" type="password" required>
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <button class="button primary" type="submit">Crear cuenta</button>
        </form>

        <p class="subtle"><a th:href="@{/}">Volver al inicio</a></p>
    </section>
</main>
</body>
</html>
