<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-shell">
    <section class="form-card">
        <h1>Iniciar sesión</h1>
        <p class="lead">Usa el correo y la contraseña con los que te registraste.</p>

        <div class="alert success" th:if="${param.registroExitoso}">
            La cuenta fue creada correctamente. Ya puedes iniciar sesión.
        </div>
        <div class="alert error" th:if="${param.error}">
            El correo o la contraseña no son correctos.
        </div>

        <form method="post" th:action="@{/login}">
            <label for="username">Correo</label>
            <input id="username" name="username" type="email" required>

            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" required>

            <button class="button primary" type="submit">Entrar</button>
        </form>

        <p class="subtle"><a th:href="@{/}">Volver al inicio</a></p>
    </section>
</main>
</body>
</html>
