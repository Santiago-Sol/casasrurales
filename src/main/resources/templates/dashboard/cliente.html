<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del cliente</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-shell">
    <section class="dashboard-card">
        <p class="eyebrow">Panel del cliente</p>
        <h1>Tu zona de reservas ya está disponible</h1>
        <p class="lead">Desde aquí podemos seguir con búsqueda de casas, disponibilidad y creación de reservas.</p>
        <form th:action="@{/logout}" method="post">
            <button class="button secondary" type="submit">Cerrar sesión</button>
        </form>
    </section>
</main>
</body>
</html>
